collection:
  route: persian_gulf_io1              # WP 1-7 subset (1,678 nm, ~140h)
  interval_nm: 1                       # 1 nm spacing = ~138 interpolated waypoints

ship:
  length_m: 200.0
  beam_m: 32.0
  draft_m: 12.0
  displacement_tonnes: 50000.0
  block_coefficient: 0.75
  rated_power_kw: 10000.0
  speed_range_knots: [11, 13]
  eta_hours: 283                       # ~3,396 nm / 12 kn
  eta_penalty_mt_per_hour: null        # null = hard ETA constraint

# 3-agent experiment: Naive, Deterministic, Stochastic
three_agent:
  enabled: true
  replan_frequency_hours: 6

# DP optimizer settings (used by Deterministic and Stochastic)
dynamic_det:
  enabled: true
  time_window_hours: 6
  forecast_origin: 0
  speed_granularity: 0.1
  time_granularity: 0.1
  distance_granularity: 1
  nodes: all
  time_windows: all

comparison:
  metrics:
    - total_fuel_mt
    - voyage_time_h
    - arrival_deviation_h
    - flow2_count
    - flow3_count
    - replan_count
    - computation_time_s
