# Experiment 1 — DP vs Luo head-to-head (single plan, full hindsight)
#
# Purpose: isolate the value of fine-grained speed control.
# Both variants see actual weather at every (node, time) — perfect knowledge.
# Only difference: speed-decision granularity.
#
# Run matrix:
#   Variant A (free):   speed_lock_hours: null  → speed changes at every leg
#   Variant B (locked): speed_lock_hours: 6     → one SWS per 6h block
#
# Switch speed_lock_hours below to toggle between variants.
# The runner (run_exp1.py) automates both runs.

collection:
  route: st_johns_liverpool
  interval_nm: 5
  hours: 0
  api_delay_seconds: 0.1

ship:
  length_m: 200.0
  beam_m: 32.0
  draft_m: 12.0
  displacement_tonnes: 50000.0
  block_coefficient: 0.75
  rated_power_kw: 10000.0
  speed_range_knots: [9, 15]            # widened for Luo comparison
  eta_hours: 163
  eta_penalty_mt_per_hour: null          # hard ETA

dynamic_det:
  enabled: true
  time_window_hours: 6
  forecast_origin: 0
  speed_granularity: 0.1
  time_granularity: 0.01                 # Route D needs fine dt (5nm legs)
  distance_granularity: 1
  nodes: all
  time_windows: all
  weather_source: "actual_hindsight"     # full hindsight — all actuals
  speed_lock_hours: null                 # null = free (ours), 6 = locked (Luo)

comparison:
  metrics:
    - total_fuel_mt
    - voyage_time_h
    - arrival_deviation_h
    - computation_time_s
    - fuel_per_nm
